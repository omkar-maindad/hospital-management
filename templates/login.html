{% extends 'base.html' %}
{% block title %}Admin Login | CareSync{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="glass-card w-full max-w-md p-8 relative overflow-hidden group border border-indigo-100 shadow-2xl">
        <!-- Decoration -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-3xl mx-auto shadow-lg mb-4 transform group-hover:rotate-6 transition-transform">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">System Security Gateway</h2>
            <p class="text-sm font-medium text-indigo-500 mt-2 tracking-wider uppercase">Authorized Personnel Only</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Administrator ID</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <input type="text" name="username" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors placeholder-gray-400" placeholder="Enter username">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Access Passcode</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fa-solid fa-key"></i>
                    </div>
                    <input type="password" name="password" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors placeholder-gray-400" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full py-3.5 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold rounded-xl shadow-lg transform hover:-translate-y-0.5 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 flex justify-center items-center">
                <i class="fa-solid fa-right-to-bracket mr-2"></i> Authenticate Access
            </button>
            
            <!-- Default credentials hint for academic presentation -->
            <div class="bg-indigo-50 border border-indigo-100 rounded-lg p-3 mt-6 text-center">
                <p class="text-xs font-bold text-indigo-800 uppercase tracking-widest"><i class="fa-solid fa-circle-info mr-1"></i> Presentation Keys</p>
                <p class="text-xs text-indigo-600 mt-1">ID: <strong>admin</strong> | Pass: <strong>password123</strong></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
